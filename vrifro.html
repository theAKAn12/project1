<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password for opinion</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        input { padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007BFF; color: white; border: none; border-radius: 4px; }
        #message { margin-top: 15px; font-weight: bold; height: 20px; }
        .incorrect { color: red; }
        .correct { color: green; }
    </style>
</head>
<body>

    <h2>Enter Password:</h2>
    <input type="password" id="passwordInput" placeholder="Password...">
    <button onclick="verifier()">OK</button>

    <div id="message"></div>

    <script>
        function verifier() {
            const mdpSaisi = document.getElementById('passwordInput').value;
            const messageDiv = document.getElementById('message');
            const mdpCorrect = "66771020";

            if (mdpSaisi === mdpCorrect) {
                // Succès
                messageDiv.textContent = "Password Correct ! Redirection in 3 seconds...";
                messageDiv.className = "correct";
                
                // Attendre 3 secondes (3000 ms) avant de rediriger
                setTimeout(function() {
                    window.location.href = "cvp1.html";
                }, 3000);

            } else {
                // Erreur
                messageDiv.textContent = "Password Incorrect";
                messageDiv.className = "incorrect";
            }
        }
    </script>

</body>
</html>
