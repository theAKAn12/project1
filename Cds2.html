<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Page-AKAN System</title>
    <style>
        /* Unicolor background: Deep Midnight Blue */
        body {
            background-color: #1a1a2e; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        .login-box {
            text-align: center;
            background: #16213e;
            padding: 50px;
            border-radius: 10px;
            border: 1px solid #0f3460;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        input {
            padding: 12px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            width: 200px;
            outline: none;
        }

        /* The Button */
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #ff2e63;
        }

        /* Status circle */
        #statusCircle {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background-color: #555; /* Default Gray */
            margin: 20px auto 0 auto;
            border: 2px solid #fff;
        }

        .feedback-text {
            margin-top: 10px;
            font-size: 14px;
            height: 20px; /* Reserves space so the layout doesn't jump */
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Enter Security Code</h2>
    <center><h5><i>By AKAN</i></h5></center>
        
        <div style="display: flex; align-items: center; justify-content: center;">
            <input type="password" id="codeInput" placeholder="Enter code...">
            <button onclick="validateAccess()">OK</button>
        </div>

        <div id="statusCircle"></div>
        <div id="msg" class="feedback-text"></div>
    </div>

    <script>
        function validateAccess() {
            const secret = "aakniax64";
            const userEntry = document.getElementById('codeInput').value;
            const circle = document.getElementById('statusCircle');
            const message = document.getElementById('msg');

            if (userEntry === secret) {
                // Success State
                circle.style.backgroundColor = "#2ecc71"; // Bright Green
                message.innerText = "Access Granted! Redirecting...";
                message.style.color = "#2ecc71";
                
                // Wait 1.5 seconds then switch page
                setTimeout(function() {
                    window.location.href = "Ds2.html";
                }, 1500);
            } 
            else {
                // Failure State
                circle.style.backgroundColor = "#e74c3c"; // Bright Red
                message.innerText = "Invalid Code. Try again.";
                message.style.color = "#e74c3c";
            }
        }

        // Optional: Allow pressing "Enter" on keyboard to trigger OK
        document.getElementById("codeInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                validateAccess();
            }
        });
    </script>

</body>
</html>
